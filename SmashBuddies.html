<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .page {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: #000;
    position: relative;
    overflow: hidden;
  }
  .video-hero {
    position: relative;
    width: 100%;
    height: 100vh;
    max-height: 560px;
    overflow: hidden;
  }
  .bg-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .video-fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.0) 30%,
      rgba(0,0,0,0.55) 65%,
      rgba(0,0,0,1) 100%
    );
    z-index: 1;
  }
  .born-badge {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 100px;
    padding: 7px 20px;
    font-size: 10.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.72);
    letter-spacing: 2.2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .content {
    position: relative;
    z-index: 2;
    margin-top: -110px;
    padding: 0 22px 52px;
  }
  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
  }
  .logo-wrap img {
    max-height: 100px;
    max-width: 240px;
    object-fit: contain;
    filter: drop-shadow(0 2px 16px rgba(255,180,60,0.22));
  }
  .tagline {
    text-align: center;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.52);
    margin-bottom: 34px;
    line-height: 1.55;
    letter-spacing: 0.15px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 13px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 11px;
    text-decoration: none;
    border-radius: 16px;
    min-height: 64px;
    padding: 16px 28px;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.1px;
    cursor: pointer;
    transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease, background 0.16s ease;
    position: relative;
    overflow: hidden;
    border: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { transform: translateY(-2px) scale(1.012); }
  .btn:active { transform: scale(0.97); }
  .btn-menu {
    background: #e5e0d6;
    color: #181614;
    box-shadow:
      0 4px 24px rgba(229,224,214,0.14),
      0 1px 4px rgba(0,0,0,0.45);
  }
  .btn-menu:hover {
    background: #ede9e0;
    box-shadow: 0 8px 36px rgba(229,224,214,0.22), 0 2px 8px rgba(0,0,0,0.45);
  }
  .btn-location {
    background: transparent;
    color: #e5e0d6;
    border: 1.5px solid rgba(229,224,214,0.3);
    box-shadow: 0 2px 12px rgba(0,0,0,0.35);
  }
  .btn-location:hover {
    background: rgba(229,224,214,0.07);
    border-color: rgba(229,224,214,0.55);
    box-shadow: 0 6px 28px rgba(0,0,0,0.45);
  }
  .btn svg {
    width: 19px;
    height: 19px;
    flex-shrink: 0;
    opacity: 0.82;
  }
  .sep {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0 8px;
  }
  .sep-line { flex: 1; height: 1px; background: rgba(255,255,255,0.09); }
  .sep-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.18); }
  .address {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.6px;
    line-height: 1.7;
  }
  .footer {
    text-align: center;
    padding: 4px 0 28px;
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.4px;
  }
  .footer a {
    color: rgba(255,255,255,0.22);
    text-decoration: none;
    margin: 0 5px;
    transition: color 0.15s;
  }
  .footer a:hover { color: rgba(255,255,255,0.5); }
  @media (max-width: 420px) {
    .video-hero { max-height: 480px; }
    .content { margin-top: -90px; padding: 0 16px 44px; }
    .btn { font-size: 14px; min-height: 58px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="video-hero">
    <video
      class="bg-video"
      autoplay
      loop
      muted
      playsinline
      poster="https://ugc.production.linktr.ee/994d3b9a-ca0b-44b4-8f03-78b1fb96bfaf_thumbnail.jpeg"
    >
      <source src="https://ugc.production.linktr.ee/5fb6a837-e612-4d64-ae3a-2ed4779557e6_Sequence-01.mp4" type="video/mp4">
    </video>
    <div class="video-fade"></div>
    <div class="born-badge">Born in Paris 🇫🇷</div>
  </div>

  <div class="content">

    <div class="logo-wrap">
      <img
        src="https://ugc.production.linktr.ee/728b47c3-55cc-4517-9348-86374cf5f90c_Asset-3-8x.png"
        alt="Smash Buddies"
      >
    </div>

    <p class="tagline">The new-gen smash burger brand, Born in Paris 🇫🇷.</p>

    <div class="links">

      <a class="btn btn-menu" href="https://ruknalshawarma.github.io/menu/" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="2"/>
          <path d="M9 12h6M9 16h4"/>
        </svg>
        The Menu
      </a>

      <a class="btn btn-location" href="https://maps.app.goo.gl/nk1D1MifvLqZJpoUA" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        Location
      </a>

    </div>

    <div class="sep">
      <div class="sep-line"></div>
      <div class="sep-dot"></div>
      <div class="sep-line"></div>
    </div>
    <p class="address">Sharjah, United Arab Emirates</p>

  </div>

  <div class="footer">
    <a href="#">Privacy</a>·<a href="#">Report</a>
  </div>

</div>
</body>
</html>
